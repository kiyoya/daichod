name: CI

# Single-maintainer flow: no PRs; every push to main runs the full
# pipeline directly.
on:
  push:
    branches: [main]

jobs:
  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Edition 2024 needs buf >= 1.68.1; the action's default lags.
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.72.0
      - name: Lint contract
        run: buf lint proto
      # daicho-api pins tagged contract releases, so the promise that must
      # hold is "no breaking change since the latest tag". Skips until the
      # first tag exists.
      - name: Breaking-change detection
        run: |
          tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -n "$tag" ]; then
            buf breaking proto --against ".git#tag=${tag},subdir=proto"
          else
            echo "no tags yet; skipping breaking-change detection"
          fi

  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      CACHE_REF: ghcr.io/${{ github.repository }}/buildcache
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # The gnucash stage compiles GnuCash from source (~40 min cold); the
      # registry cache makes that a one-time cost per version bump.
      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          target: dev
          tags: daichod-dev:ci
          load: true
          cache-from: type=registry,ref=${{ env.CACHE_REF }}
          cache-to: >-
            ${{ github.event_name == 'push'
                && format('type=registry,ref={0},mode=max', env.CACHE_REF)
                || '' }}
      # Compiler cache: the image sets CCACHE_DIR=/src/.ccache, so caching
      # the repo-local directory carries object compilations across runs.
      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-
      - name: Build daichod
        run: >
          docker run --rm -v "$PWD:/src" -v daichod-build:/build
          -v "$PWD/.ccache:/ccache" daichod-dev:ci
          bash -c "cmake -S /src -B /build -G Ninja
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          && cmake --build /build"
      - name: Run tests
        run: >
          docker run --rm -v "$PWD:/src" -v daichod-build:/build
          daichod-dev:ci
          bash -c "ctest --test-dir /build/test -j \"\$(nproc)\"
          --output-on-failure"
      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          target: runtime
          tags: daichod:ci
          cache-from: type=registry,ref=${{ env.CACHE_REF }}
