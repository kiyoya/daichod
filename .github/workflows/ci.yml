name: CI

# PR flow: contract checks and the container build + full test suite run on
# every pull request and on main. The registry layer cache keeps the warm
# path at a few minutes; only a GNUCASH_VERSION/GRPC_VERSION pin bump pays
# the ~60-minute source-stage rebuild again.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# A force-push to a PR branch supersedes the running build for that ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # buf-action supersedes buf-setup-action (Node 24, token wired by
      # default). setup_only: the lint/breaking commands below are ours.
      # Edition 2024 needs buf >= 1.68.1; the action's default lags.
      - uses: bufbuild/buf-action@v1
        with:
          version: 1.72.0
          setup_only: true
      - name: Lint contract
        run: buf lint proto
      # daicho-api pins tagged contract releases, so the promise that must
      # hold is "no breaking change since the latest tag". Skips until the
      # first tag exists.
      - name: Breaking-change detection
        run: |
          tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -n "$tag" ]; then
            buf breaking proto --against ".git#tag=${tag},subdir=proto"
          else
            echo "no tags yet; skipping breaking-change detection"
          fi

  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      CACHE_REF: ghcr.io/${{ github.repository }}/buildcache
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # The gnucash and grpc stages compile from source (~40 and ~20 min
      # cold); the registry cache makes that a one-time cost per pin bump.
      # Only main refreshes the shared cache: PR branches read it but must
      # not churn it (and a fork PR's read-only token couldn't write it).
      - name: Build dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          target: dev
          tags: daichod-dev:ci
          load: true
          cache-from: type=registry,ref=${{ env.CACHE_REF }}
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0},mode=max', env.CACHE_REF) || '' }}
      # Compiler cache: the image sets CCACHE_DIR=/ccache; the cached host
      # directory is bind-mounted there.
      - name: Restore compiler cache
        uses: actions/cache@v6
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-
      - name: Build daichod
        run: >
          docker run --rm -v "$PWD:/src" -v daichod-build:/build
          -v "$PWD/.ccache:/ccache" daichod-dev:ci
          bash -c "cmake -S /src -B /build -G Ninja
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          && cmake --build /build"
      - name: Run tests
        run: >
          docker run --rm -v "$PWD:/src" -v daichod-build:/build
          daichod-dev:ci
          bash -c "ctest --test-dir /build/test -j \"\$(nproc)\"
          --output-on-failure"
      - name: Build runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          target: runtime
          tags: daichod:ci
          cache-from: type=registry,ref=${{ env.CACHE_REF }}
