name: Publish

# A contract tag (Major.YYYYMMDD.Iteration, see CONTRACT.md) publishes the
# runtime image to GitHub Packages as ghcr.io/<repo>:<tag> and :latest.
# Deliberately no GitHub Release: tags and packages are the whole release
# story. The tagged commit already passed the full suite as a PR and again
# on main, so this workflow only assembles and pushes the deliverable.
#
# The image is a manifest list covering linux/amd64 (CI, x86 dev hosts) and
# linux/arm64 (bastion-1, a Raspberry Pi 5). The build stages compile
# GnuCash and gRPC from source, so cross-building under QEMU emulation is
# off the table; instead each platform builds natively (public repos get
# GitHub's arm64 runners for free) and pushes by digest, and the merge job
# stitches the digests into the tagged manifest list. Warm per-arch layer
# caches keep a publish to a couple of minutes; a pin bump pays the
# source-stage rebuild once per arch.
on:
  push:
    tags: ["[0-9]*.[0-9]*.[0-9]*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    env:
      # Per-arch cache refs: a shared ref would have each arch evicting the
      # other's layers on every push, forcing the full source rebuild.
      CACHE_REF: ghcr.io/${{ github.repository }}/buildcache-${{ matrix.arch }}
      IMAGE_REF: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # provenance off: the attestation manifests would show up as confusing
      # "unknown/unknown" entries next to the real platforms in the list.
      # cache-to only on arm64: CI owns the amd64 cache (dev target,
      # mode=max spans every stage), and overwriting it with this job's
      # runtime-only graph would evict the dev-stage layers CI relies on;
      # arm64 has no CI build, so publish is its cache's only writer.
      - name: Build and push runtime image by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          target: runtime
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE_REF }},push-by-digest=true,push=true
          cache-from: type=registry,ref=${{ env.CACHE_REF }}
          cache-to: ${{ matrix.arch == 'arm64' && format('type=registry,ref={0},mode=max', env.CACHE_REF) || '' }}
          provenance: false
      # The digest travels to the merge job as an empty file named after it.
      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      IMAGE_REF: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: digests
          pattern: digest-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push the manifest list
        working-directory: digests
        run: >
          docker buildx imagetools create
          -t "$IMAGE_REF:$GITHUB_REF_NAME"
          -t "$IMAGE_REF:latest"
          $(printf -- "$IMAGE_REF@sha256:%s " *)
      - name: Show the published manifest list
        run: docker buildx imagetools inspect "$IMAGE_REF:$GITHUB_REF_NAME"
